name: Publish to DigitalOcean Container Registry - Build & Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    env:
      REGISTRY: registry.digitalocean.com/ayd2-p2
      IMAGE_TAG: ${{ github.sha }}

    steps:
      # ── Checkout ─────────────────────────────────────

      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Install DigitalOcean CLI ───────────────────

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      # ── Login to DigitalOcean Registry ─────────────

      - name: Login to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      # ── Build Docker Image ─────────────────────────

      - name: Build Docker image — iam-service
        run: |
          SHORT_SHA=$(echo $IMAGE_TAG | head -c7)

          docker build \
            -t $REGISTRY/iam-service:$SHORT_SHA \
            -t $REGISTRY/iam-service:latest \
            .

      # ── Push Image ─────────────────────────────────

      - name: Push Docker image — iam-service
        run: |
          SHORT_SHA=$(echo $IMAGE_TAG | head -c7)

          docker push $REGISTRY/iam-service:$SHORT_SHA
          docker push $REGISTRY/iam-service:latest
