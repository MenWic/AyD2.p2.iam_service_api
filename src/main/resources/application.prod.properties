# ============================================================
# Configuracion local
# Proyecto AyD2 P2B
# ============================================================

spring.application.name=iam-service

# server.port=8081
server.port=${SERVER_PORT:8081}

# ============================================================
# Datasource PostgreSQL
# ============================================================

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/iam_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# ============================================================

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Mostrar SQL solo en local. En produccion debe ir en false.
spring.jpa.show-sql=false

# ============================================================
# Flyway
# ============================================================

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============================================================
# Actuator
# ============================================================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# ============================================================
# OpenAPI / Swagger
# ============================================================

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================================
# Seguridad / JWT
# Cambiar en cada ambiente real.
# En produccion debe venir desde variables de entorno o secrets.
# ============================================================

security.jwt.secret=${SECURITY_JWT_SECRET:your_jwt_secret_at_least_32_chars_here}
security.jwt.expiration-minutes=${SECURITY_JWT_EXPIRATION_MINUTES:15}
security.jwt.refresh-expiration-days=${SECURITY_JWT_REFRESH_EXPIRATION_DAYS:7}

# ============================================================
# CORS local
# Ajustar cuando el frontend tenga puerto definitivo.
# ============================================================

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# ============================================================
# Eureka
# ============================================================

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true